    <style>
        td.l, td.r, .sb{
            width: 2em;

        td.c{

            text-align: center;

		/* slider aanmaken */
		
.slider-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around; /* Verdeelt de groepen gelijkmatig over de hoogte */
    width: 90px;
    height: 545px; /* Match de hoogte van het canvas */
    background-color: var(--teamcolor);
    color: white;
    padding: 20px 5px;
    border-radius: 10px;
    box-sizing: border-box;
}

.slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-family: Arial, sans-serif;
    font-size: 0.85em;
    text-align: center;
}

/* Verticale styling voor de sliders */
input[type=range][orient=vertical] {
    writing-mode: vertical-lr;
    direction: rtl;
    appearance: slider-vertical;
    -webkit-appearance: slider-vertical;
    width: 8px;
    height: 180px; /* Iets kortere sliders om ruimte te maken voor de labels */
    cursor: pointer;
}

/* Zorg dat de kolommen netjes naast elkaar staan */
.canvas-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-end; /* Lijn canvassen onderaan uit */
    gap: 20px;
    padding: 10px 20px;
}

.canvas-column {
    display: flex;
    flex-direction: column;
    align-items: center; /* Centreert alles (tekst + canvas) in de kolom */
}

.canvas-info {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    text-align: center;
    margin-bottom: 4px;
    min-height: 60px; /* Houdt de hoogte compact en zorgt voor minder ruimte tussen titel en canvas */
}

.canvas-info h1, .canvas-info h2 {
    margin: 0;
}

/* Stijl voor de nieuwe navigatiebalk */
.nav-controls {
    display: flex;
    justify-content: center;
    padding: 10px;
    background: #f4f4f4;
    border-bottom: 2px solid var(--teamcolor);
}

.nav-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap; /* Zorgt ervoor dat knoppen naar de volgende regel gaan bij te weinig ruimte */
    justify-content: center;
}


/* --- Mobiele Responsiveness --- */
@media (max-width: 768px) {
    /* Zet de canvassen en sliders onder elkaar in plaats van naast elkaar */
    .canvas-wrapper {
        flex-direction: column;
        align-items: center;
        padding: 10px 5px;
    }

    /* Maak het slider blok horizontaal zodat het beter tussen de canvassen past */
    .slider-container {
        flex-direction: row;
        width: 100%;
        height: auto;
        padding: 15px;
    }

    /* Verander de verticale sliders naar gewone horizontale sliders voor mobiel */
    input[type=range][orient=vertical] {
        writing-mode: horizontal-tb;
        direction: ltr;
        appearance: auto;
        -webkit-appearance: auto;
        width: 120px;
        height: 15px;
    }

    /* Maak de navigatieknoppen iets breder en makkelijker aan te tikken */
    .btn {
        padding: 10px 15px;
        margin-bottom: 5px;
        font-size: 0.9em;
    }
}


		
		
    </style>
</head>
<body>

<div class="nav-controls">
    <div class="nav-row">
        <button onclick="prevdrittel()" class="btn">&larr; Deel</button>
        <button onclick="prevtanz()" class="btn">&larr; Dans</button>
        <button onclick="prev()" class="btn">&larr; Beeld</button>
        <button onclick="animatePrev(false)" class="btn">&laquo; Move</button>
        <button onclick="animatePrev(true)" class="btn">&laquo;&laquo; Play to Start</button>
        
        <span style="width: 40px;"></span> <button onclick="animateNext(true)" class="btn">Play to End &raquo;&raquo;</button>
        <button onclick="animateNext(false)" class="btn">Move &raquo;</button>
        <button onclick="next()" class="btn">Beeld &rarr;</button>
        <button onclick="nexttanz()" class="btn">Dans &rarr;</button>
        <button onclick="nextdrittel()" class="btn">Deel &rarr;</button>
    </div>
</div>

<div class="canvas-wrapper">
    <div class="canvas-column">
        <div class="canvas-info">
            <h2 id="bildinfo">1. Drittel - Wiener Walzer 1 - Anfang</h2>
        </div>
        <canvas id="halle" height="545" width="545"></canvas>
    </div>




 <div class="slider-container">
        <div class="slider-group">
            <label for="speedSlider">Snelheid</label>
            <input type="range" id="speedSlider" min="1" max="20" value="10" orient="vertical">
        </div>
        <div class="slider-group">
            <label for="transparencySlider">Canvas 2<br>Transparantie</label>
            <input type="range" id="transparencySlider" min="0" max="100" value="100" orient="vertical">
        </div>
    </div>

    <div class="canvas-column">
        <div class="canvas-info">
            <h2>&nbsp;</h2> <h2>&nbsp;</h2>
            <h2>Volgend beeld</h2>
        </div>
        <canvas id="halle2" height="545" width="545"></canvas>
    </div>
</div>
